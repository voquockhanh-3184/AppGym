buildscript {
    ext {
        buildToolsVersion = "35.0.0"
        minSdkVersion = 26
        compileSdkVersion = 35
        targetSdkVersion = 35
        
        ndkVersion = "27.1.12297006" 
        kotlinVersion = "1.9.24"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle:8.1.1")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlinVersion")
        // classpath 'com.google.gms:google-services:4.4.2' // Tạm tắt nếu chưa có file google-services.json
    }
}

apply plugin: "com.facebook.react.rootproject"

// 👇 ĐOẠN CODE QUAN TRỌNG ĐỂ SỬA LỖI CRASH 👇
allprojects {
    repositories {
        google()
        mavenCentral()
    }
    
    configurations.all {
        resolutionStrategy {
            // Ép buộc toàn bộ dự án dùng bản 17.0.0
            // Để sửa lỗi "Found interface FusedLocationProviderClient, but class was expected"
            force "com.google.android.gms:play-services-location:20.0.0"
        }
    }
}